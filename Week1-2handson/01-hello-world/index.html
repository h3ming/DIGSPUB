<!DOCTYPE html>
<html>
  <head>
    <!--
      Module 01: Hello World Site
      
      This is the most basic HTML document structure.
      
      The <head> section contains:
      - Metadata about the document
      - Links to external resources (CSS, fonts, etc.)
      
      The <body> section contains:
      - All visible content on the page
    -->
    <meta charset="UTF-8">
    <title>Hello World - My First Website</title>
    
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="style.css">
  </head>
  
  <body>
    <!-- 
      This is the main content area.
      The <h1> element is the main heading of the page.
      There should typically only be one <h1> per page.
    -->
    <h1>Hello World!</h1>
    
    <!--
      EXERCISE: Add more elements below this comment!
      Try adding:
      - <p>This is a paragraph.</p>
      - <h2>This is a subheading</h2>
      - <ul><li>List item 1</li><li>List item 2</li></ul>
    -->
    <p>This is a paragraph.</p>
    
  </body>
</html>
